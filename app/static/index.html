<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provenance Guard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🛡️ Provenance Guard</h1>
    <p class="subtitle">Multi-modal AI content detection &amp; transparency</p>
    <div class="apikey">
      <label>API Key</label>
      <input id="apiKey" type="text" value="dev-local-key" />
    </div>
  </header>

  <main>
    <!-- Submit -->
    <section class="card">
      <h2>Submit content</h2>
      <label>Creator ID</label>
      <input id="creatorId" type="text" placeholder="alice" value="alice" />
      <label>Text</label>
      <textarea id="text" rows="6" placeholder="Paste content to analyse..."></textarea>
      <label>Or upload a file (image / video)</label>
      <input id="file" type="file" accept="image/*,video/*" />
      <button id="submitBtn">Analyse</button>
      <div id="submitResult" class="result"></div>
    </section>

    <!-- Appeal -->
    <section class="card">
      <h2>File an appeal</h2>
      <label>Content ID</label>
      <input id="appealId" type="text" placeholder="content_id from a result" />
      <label>Reasoning</label>
      <textarea id="appealReason" rows="3" placeholder="Why this classification is wrong..."></textarea>
      <button id="appealBtn" class="secondary">Submit appeal</button>
      <div id="appealResult" class="result"></div>
    </section>

    <!-- Certify -->
    <section class="card">
      <h2>Verify a human creator</h2>
      <label>Creator ID</label>
      <input id="certId" type="text" placeholder="alice" />
      <button id="certBtn" class="secondary">Issue certificate</button>
      <div id="certResult" class="result"></div>
    </section>

    <!-- Dashboard -->
    <section class="card wide">
      <h2>Analytics dashboard</h2>
      <button id="dashBtn" class="secondary">Refresh metrics</button>
      <div id="dashResult" class="result"></div>
    </section>

    <!-- Audit log -->
    <section class="card wide">
      <h2>Audit log</h2>
      <button id="logBtn" class="secondary">Refresh log</button>
      <div id="logResult" class="result"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
